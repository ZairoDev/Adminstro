name: Deploy to VPS (Zero-Downtime)

on:
  push:
    branches: [main]
  workflow_dispatch:

# cancel-in-progress: true so only the newest commit deploys.
# Queuing with false means a slow older deploy can finish AFTER
# a newer one has already been queued, briefly running stale code.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure SSH
        run: |
          set -euo pipefail

          log() { echo "[ssh-setup] $*"; }
          fail() { echo "[ssh-setup] ERROR: $*" >&2; exit 1; }

          log "=== SSH setup diagnostics ==="

          VPS_HOST="${{ secrets.VPS_HOST }}"
          VPS_USER="${{ secrets.VPS_USERNAME }}"
          VPS_KEY="${{ secrets.VPS_SSH_KEY }}"

          if [ -z "${VPS_HOST}" ]; then fail "VPS_HOST secret is missing or empty"; fi
          if [ -z "${VPS_USER}" ]; then fail "VPS_USERNAME secret is missing or empty"; fi
          if [ -z "${VPS_KEY}" ]; then fail "VPS_SSH_KEY secret is missing or empty"; fi

          log "Target host: ${VPS_HOST}"
          log "Target user: ${VPS_USER}"
          log "SSH port: 22"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # printf preserves PEM/OpenSSH key newlines (echo can corrupt keys).
          printf '%s\n' "${VPS_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ssh-keygen -l -f ~/.ssh/deploy_key >/tmp/key_info 2>&1; then
            log "Deploy key loaded: $(head -1 /tmp/key_info)"
          else
            cat /tmp/key_info >&2
            fail "VPS_SSH_KEY is invalid or malformed"
          fi

          log "--- DNS lookup ---"
          getent hosts "${VPS_HOST}" 2>&1 || true
          host "${VPS_HOST}" 2>&1 || true

          log "--- TCP reachability (port 22) ---"
          PORT_OK=false
          if command -v nc >/dev/null 2>&1; then
            if nc -z -w 15 "${VPS_HOST}" 22; then
              PORT_OK=true
              log "Port 22 is reachable from GitHub runner"
            else
              log "Port 22 is NOT reachable from GitHub runner (timeout/refused/filtered)"
            fi
          elif timeout 15 bash -c "echo > /dev/tcp/${VPS_HOST}/22" 2>/dev/null; then
            PORT_OK=true
            log "Port 22 is reachable from GitHub runner"
          else
            log "Could not verify port 22 (nc unavailable and /dev/tcp check failed)"
          fi

          if [ "${PORT_OK}" = false ]; then
            fail "Cannot reach ${VPS_HOST}:22 — check VPS firewall, security group, and that sshd is listening"
          fi

          log "--- Host key collection (ssh-keyscan) ---"
          if ssh-keyscan -T 15 -p 22 -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            log "ssh-keyscan succeeded"
          else
            log "ssh-keyscan failed (non-fatal, using StrictHostKeyChecking=no):"
            cat /tmp/keyscan.err >&2 || true
          fi

          log "--- SSH authentication test ---"
          if ssh -i ~/.ssh/deploy_key \
            -p 22 \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o LogLevel=INFO \
            "${VPS_USER}@${VPS_HOST}" \
            "echo connected; hostname; whoami; pwd"; then
            log "SSH authentication successful"
          else
            fail "SSH auth failed for ${VPS_USER}@${VPS_HOST} — verify VPS_SSH_KEY is in ~/.ssh/authorized_keys on the server"
          fi

          log "=== SSH setup complete ==="

      - name: Fetch production env from VPS
        run: |
          set -euo pipefail

          log() { echo "[fetch-env] $*"; }
          fail() { echo "[fetch-env] ERROR: $*" >&2; exit 1; }

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o BatchMode=yes"
          REMOTE="${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}"

          log "Fetching production env from ${REMOTE}"

          for REMOTE_ENV in \
            /var/www/adminstro/.env.production \
            /var/www/adminstro/.env.local; do
            log "Trying ${REMOTE_ENV} ..."
            if scp ${SSH_OPTS} "${REMOTE}:${REMOTE_ENV}" .env.production; then
              cp .env.production .env.local
              log "Using env from ${REMOTE_ENV}"
              exit 0
            fi
            log "Not found or not readable: ${REMOTE_ENV}"
          done

          fail "Could not fetch .env.production or .env.local from VPS"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare production dependencies
        run: |
          rm -rf node_modules
          npm ci --omit=dev
          # tsx runs socket.ts in production; it is still listed under devDependencies.
          npm install --no-save tsx

      - name: Package release
        run: |
          tar -czf release.tar.gz \
            --exclude='.next/cache' \
            --exclude='node_modules/.cache' \
            .next \
            node_modules \
            public \
            src \
            socket.ts \
            package.json \
            package-lock.json \
            next.config.mjs \
            tsconfig.json \
            postcss.config.mjs \
            tailwind.config.ts \
            components.json \
            next-env.d.ts

      - name: Upload release to VPS
        run: |
          set -euo pipefail

          log() { echo "[upload] $*"; }

          RELEASE_ID="$(date -u +%Y%m%d_%H%M%S)_${GITHUB_SHA::7}"
          echo "RELEASE_ID=${RELEASE_ID}" >> "${GITHUB_ENV}"

          ARCHIVE_SIZE="$(du -h release.tar.gz | cut -f1)"
          log "Uploading release ${RELEASE_ID} (${ARCHIVE_SIZE}) to VPS ..."

          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o BatchMode=yes \
            release.tar.gz \
            "${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/adminstro_${RELEASE_ID}.tar.gz"

          log "Upload complete: /tmp/adminstro_${RELEASE_ID}.tar.gz"

      - name: Activate release on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          RELEASE_ID: ${{ env.RELEASE_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script_stop: true
          envs: RELEASE_ID
          script: |
            set -euo pipefail

            DEPLOY_DIR="/var/www/adminstro"
            RELEASES_DIR="/var/www/adminstro_releases"
            PM2_APP_NAME="adminstro"
            ARCHIVE="/tmp/adminstro_${RELEASE_ID}.tar.gz"
            NEW_RELEASE="${RELEASES_DIR}/${RELEASE_ID}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Activating release: ${RELEASE_ID}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            health_check() {
              local attempt=1
              local max_attempts=30   # 30 × 2s = 60s window

              while [ "${attempt}" -le "${max_attempts}" ]; do
                APP_STATUS="$(pm2 jlist 2>/dev/null | python3 -c "import sys,json;apps=json.load(sys.stdin);m=[a for a in apps if a.get('name')=='${PM2_APP_NAME}'];print(m[0]['pm2_env']['status'] if m else 'missing')" 2>/dev/null || echo "error")"

                if [ "${APP_STATUS}" = "online" ]; then
                  HTTP_CODE="$(curl -s -o /dev/null -w "%{http_code}" \
                    --max-time 5 http://localhost:3000 2>/dev/null || true)"
                  HTTP_CODE="${HTTP_CODE:-000}"

                  if [ "${HTTP_CODE}" != "000" ] && [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 500 ]; then
                    echo "Health check passed (HTTP ${HTTP_CODE}) on attempt ${attempt}"
                    return 0
                  fi
                fi

                echo "Attempt ${attempt}/${max_attempts}: status=${APP_STATUS} http=${HTTP_CODE:-pending}"
                sleep 2
                attempt=$((attempt + 1))
              done

              echo "Health check failed after ${max_attempts} attempts"
              return 1
            }

            ensure_release_layout() {
              sudo mkdir -p "${RELEASES_DIR}"

              if [ -d "${DEPLOY_DIR}" ] && [ ! -L "${DEPLOY_DIR}" ]; then
                echo "One-time migration to release symlink layout..."
                MIGRATED="${RELEASES_DIR}/migrated_$(date +%Y%m%d_%H%M%S)"
                sudo mv "${DEPLOY_DIR}" "${MIGRATED}"
                sudo ln -s "${MIGRATED}" "${DEPLOY_DIR}"
                sudo chown -h jenkins:jenkins "${DEPLOY_DIR}" || true
                sudo chown -R jenkins:jenkins "${MIGRATED}"

                if pm2 describe "${PM2_APP_NAME}" >/dev/null 2>&1; then
                  pm2 reload "${PM2_APP_NAME}" --update-env
                else
                  cd "${DEPLOY_DIR}"
                  pm2 start npm --name "${PM2_APP_NAME}" --update-env -- start
                fi
                pm2 save
              fi

              if [ ! -e "${DEPLOY_DIR}" ]; then
                sudo mkdir -p "${RELEASES_DIR}/bootstrap"
                sudo chown -R jenkins:jenkins "${RELEASES_DIR}/bootstrap"
                sudo ln -s "${RELEASES_DIR}/bootstrap" "${DEPLOY_DIR}"
                sudo chown -h jenkins:jenkins "${DEPLOY_DIR}" || true
              fi
            }

            copy_runtime_env() {
              local source_dir="$1"
              local target_dir="$2"

              for ENV_FILE in .env.production .env.local; do
                if [ -f "${source_dir}/${ENV_FILE}" ]; then
                  cp "${source_dir}/${ENV_FILE}" "${target_dir}/${ENV_FILE}"
                fi
              done

              if [ ! -f "${target_dir}/.env.local" ] && [ -f "${target_dir}/.env.production" ]; then
                cp "${target_dir}/.env.production" "${target_dir}/.env.local"
              fi
            }

            rollback_to() {
              local previous_release="$1"

              if [ -n "${previous_release}" ] && [ -d "${previous_release}" ]; then
                echo "Rolling back to ${previous_release}"
                sudo ln -sfn "${previous_release}" "${DEPLOY_DIR}"
                sudo chown -h jenkins:jenkins "${DEPLOY_DIR}" || true

                if pm2 describe "${PM2_APP_NAME}" >/dev/null 2>&1; then
                  pm2 reload "${PM2_APP_NAME}" --update-env
                else
                  cd "${DEPLOY_DIR}"
                  pm2 start npm --name "${PM2_APP_NAME}" --update-env -- start
                fi
                pm2 save
              else
                echo "WARNING: No valid previous release to roll back to (${previous_release})"
              fi
            }

            cleanup_old_releases() {
              local live_release dir target
              local -a old_releases legacy_backups

              live_release="$(readlink -f "${DEPLOY_DIR}" 2>/dev/null || echo "")"
              echo "Cleaning up old releases (keeping last 5, live=${live_release})..."

              if [ -d "${RELEASES_DIR}" ]; then
                cd "${RELEASES_DIR}" || { echo "WARN: cannot cd to ${RELEASES_DIR}"; return 0; }

                # Do NOT use "while read" here — with set -e, read returning EOF
                # exits the entire script (not just this function).
                mapfile -t old_releases < <(ls -dt */ 2>/dev/null | tail -n +6 || true)
                for dir in "${old_releases[@]:-}"; do
                  [ -z "${dir}" ] && continue
                  target="${RELEASES_DIR}/${dir%/}"
                  if [ "${target}" = "${live_release}" ]; then
                    echo "Skipping live release: ${target}"
                    continue
                  fi
                  echo "Removing ${target}"
                  sudo rm -rf "${target}" || echo "WARN: failed to remove ${target}"
                done
              fi

              if cd /var/www 2>/dev/null; then
                mapfile -t legacy_backups < <(ls -dt adminstro_rollback_* 2>/dev/null || true)
                for dir in "${legacy_backups[@]:-}"; do
                  [ -z "${dir}" ] && continue
                  echo "Removing legacy backup ${dir}"
                  sudo rm -rf "${dir}" || echo "WARN: failed to remove ${dir}"
                done
              fi

              sudo rm -rf /var/www/adminstro_new_build 2>/dev/null || true
              echo "Cleanup complete"
              return 0
            }

            # ── main ─────────────────────────────────────────────────────────

            ensure_release_layout

            if [ ! -f "${ARCHIVE}" ]; then
              echo "Release archive not found: ${ARCHIVE}"
              exit 1
            fi

            PREVIOUS_RELEASE=""
            if [ -L "${DEPLOY_DIR}" ]; then
              PREVIOUS_RELEASE="$(readlink -f "${DEPLOY_DIR}")"
            fi

            echo "Extracting release to ${NEW_RELEASE}..."
            sudo rm -rf "${NEW_RELEASE}"
            sudo mkdir -p "${NEW_RELEASE}"
            sudo tar -xzf "${ARCHIVE}" -C "${NEW_RELEASE}"
            sudo chown -R jenkins:jenkins "${NEW_RELEASE}"
            rm -f "${ARCHIVE}"

            copy_runtime_env "${PREVIOUS_RELEASE}" "${NEW_RELEASE}"

            echo "Switching live symlink..."
            sudo ln -sfn "${NEW_RELEASE}" "${DEPLOY_DIR}"
            sudo chown -h jenkins:jenkins "${DEPLOY_DIR}" || true

            cd "${DEPLOY_DIR}"

            if pm2 describe "${PM2_APP_NAME}" >/dev/null 2>&1; then
              pm2 reload "${PM2_APP_NAME}" --update-env
            else
              pm2 start npm --name "${PM2_APP_NAME}" --update-env -- start
            fi
            pm2 save

            echo "Running health checks..."
            if ! health_check; then
              echo "Health check failed — initiating rollback"
              rollback_to "${PREVIOUS_RELEASE}"
              sudo rm -rf "${NEW_RELEASE}"
              exit 1
            fi

            cleanup_old_releases || echo "WARN: cleanup had errors (deploy is still live)"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "DEPLOYMENT SUCCESSFUL"
            echo "Release: ${RELEASE_ID}"
            echo "Time: $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            pm2 list